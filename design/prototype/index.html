<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nitean Prototype</title>
  <style>
    :root {
      --day-bg: #fff8ea;
      --day-surface: #ffffff;
      --day-alt: #f3e7d2;
      --primary: #b7791f;
      --primary-pressed: #8f5a13;
      --secondary: #275c65;
      --accent: #9e3f2f;
      --text: #26170f;
      --muted: #6f5944;
      --border: #e7d6b8;
      --night-bg: #100b08;
      --night-surface: #1d130d;
      --night-alt: #2b1d12;
      --night-text: #f6e4c7;
      --night-muted: #b99565;
      --night-border: #49331f;
      font-family: Avenir, "Avenir Next", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--day-bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(420px, 100vw);
      min-height: 100vh;
      background: var(--day-bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      min-height: 72px;
      padding: 18px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--night-bg);
      color: #d6a24e;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 22px;
      border: 2px solid #d6a24e;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lang {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--border);
      background: var(--day-alt);
      border-radius: 8px;
    }

    .lang button,
    .toolbar button,
    .pager button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .lang button {
      width: 36px;
      height: 32px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }

    .lang .active {
      background: var(--primary);
      color: white;
    }

    main {
      padding: 10px 20px 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .stage {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .stage span {
      flex: 0 0 auto;
      min-width: 58px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .stage .active {
      color: var(--text);
      background: var(--day-alt);
      border-color: var(--primary);
    }

    .story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .story {
      min-height: 188px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--day-surface);
    }

    .cover {
      height: 112px;
      background:
        linear-gradient(140deg, rgba(39, 92, 101, 0.92), rgba(214, 162, 78, 0.62)),
        radial-gradient(circle at 30% 40%, #f6e4c7 0 18%, transparent 19%),
        #f3e7d2;
      position: relative;
    }

    .cover::after {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 20px;
      height: 28px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.66);
      border-top: 0;
    }

    .story h2 {
      margin: 10px 10px 2px;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .story p {
      margin: 0 10px 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .reader {
      display: none;
      min-height: calc(100vh - 90px);
      grid-template-rows: auto auto 1fr auto;
    }

    .reader-hero {
      height: 260px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 30%, #f6e4c7 0 12%, transparent 13%),
        linear-gradient(160deg, #275c65 0%, #d6a24e 100%);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .reader-hero::before {
      content: "";
      position: absolute;
      left: 88px;
      right: 88px;
      bottom: 56px;
      height: 60px;
      border-radius: 50%;
      border: 8px solid rgba(255,255,255,0.75);
      border-top: 0;
    }

    .copy {
      background: var(--day-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      font-size: 20px;
      line-height: 1.55;
    }

    .toolbar,
    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .toolbar button,
    .pager button {
      min-width: 44px;
      min-height: 44px;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-weight: 800;
    }

    .toolbar button.secondary {
      background: var(--secondary);
    }

    .bottom {
      padding: 12px 20px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    body.reading .home { display: none; }
    body.reading .reader { display: grid; }

    body.bedtime {
      background: var(--night-bg);
      color: var(--night-text);
    }

    body.bedtime .shell {
      background: var(--night-bg);
      border-color: var(--night-border);
    }

    body.bedtime .copy,
    body.bedtime .story {
      background: var(--night-surface);
      border-color: var(--night-border);
      color: var(--night-text);
    }

    body.bedtime .reader-hero {
      border-color: var(--night-border);
      opacity: 0.86;
    }

    body.bedtime .reader-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(44, 24, 10, 0.72);
    }

    body.bedtime .topbar,
    body.bedtime .bottom,
    body.bedtime .story p {
      color: var(--night-muted);
    }

    body.bedtime .toolbar button,
    body.bedtime .pager button {
      background: #d6a24e;
      color: #100b08;
    }

    body.bedtime .toolbar button.secondary {
      background: #6fa5a0;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">N</div>
        <h1>Nitean</h1>
      </div>
      <div class="lang" aria-label="Language">
        <button>KM</button>
        <button class="active">FR</button>
        <button>EN</button>
      </div>
    </header>

    <main class="home">
      <div class="stage" aria-label="Reading level">
        <span class="active">L1</span>
        <span>L2</span>
        <span>L3</span>
        <span>L4</span>
      </div>
      <section class="story-grid">
        <button class="story" onclick="document.body.classList.add('reading')">
          <div class="cover"></div>
          <h2>The Moon Rabbit</h2>
          <p>Free - 6 pages</p>
        </button>
        <button class="story" onclick="document.body.classList.add('reading')">
          <div class="cover"></div>
          <h2>The Wise Grandmother</h2>
          <p>Locked - 8 pages</p>
        </button>
      </section>
    </main>

    <main class="reader">
      <div class="toolbar">
        <button class="secondary" onclick="document.body.classList.remove('reading')">‹</button>
        <button onclick="document.body.classList.toggle('bedtime')">☾</button>
      </div>
      <div class="reader-hero"></div>
      <p class="copy">La petite famille écoute doucement. Quand la clochette sonne, l'enfant tourne la page et retrouve les mots khmers avec confiance.</p>
      <div class="pager">
        <button>‹</button>
        <span>1 / 6</span>
        <button>›</button>
      </div>
    </main>

    <footer class="bottom">Khmer stories in three languages, made for bedtime.</footer>
  </div>
</body>
</html>
